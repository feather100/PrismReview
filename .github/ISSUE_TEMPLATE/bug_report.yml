name: Bug report
description: Report something that is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug issue. Please fill in as much of the requested information as you can.
  - type: checkboxes
    id: terms
    attributes:
      label: Before you start
      options:
        - label: I have searched the existing issues and discussions to avoid duplicates
          required: true
        - label: I am running the latest `main` version
          required: false
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: A one-line summary of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. Expected vs actual
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS / Node version / MODEL_PROVIDER (mock|lmstudio|openai_compatible)"
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
