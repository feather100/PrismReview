name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: "TypeScript (api + web)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @prismreview/api prisma:generate

      - name: Type-check API
        run: cd apps/api && npx tsc --noEmit -p tsconfig.json

      - name: Type-check Web
        run: cd apps/web && npx tsc --noEmit -p tsconfig.json

  smoke:
    name: "Smoke scripts"
    runs-on: ubuntu-latest
    needs: typecheck
    # Smoke scripts currently require a running backend + Postgres/Redis; we
    # spin them up here so the suite can exercise real endpoints. If this
    # becomes flaky, fall back to "mock-only smoke" subset.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prismreview
          POSTGRES_PASSWORD: prismreview
          POSTGRES_DB: prismreview
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @prismreview/api prisma:generate
      - run: pnpm --filter @prismreview/api prisma:migrate --name init --skip-generate || true

      - name: Start API in background
        env:
          DATABASE_URL: postgresql://prismreview:prismreview@localhost:5432/prismreview?schema=public
          REDIS_URL: redis://localhost:6379
          MODEL_PROVIDER: mock
          ALLOW_EXTERNAL_MODEL_CALLS: "false"
        run: |
          pnpm --filter @prismreview/api build
          node apps/api/dist/main.js & echo $! > /tmp/api.pid
          # Wait for API readiness
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/api/reviews -o /dev/null && break
            sleep 1
          done

      - name: Run smoke scripts
        env:
          DATABASE_URL: postgresql://prismreview:prismreview@localhost:5432/prismreview?schema=public
        run: |
          node scripts/smoke-runtime.js --base http://localhost:4000
          node scripts/smoke-queue.js
          node scripts/smoke-sse.js --base http://localhost:4000

  secrets:
    name: "Secret scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No real credentials should be present in tracked source
        run: |
          set +e
          if git grep -nE 'sk-[A-Za-z0-9]{20,}|AIza[A-Za-z0-9_-]{20,}|Bearer\s+[A-Za-z0-9._-]{20,}' -- '*.ts' '*.tsx' '*.js' '*.py' ':!apps/web/.next/*'; then
            echo "FAIL: potential secret found in tracked source"
            exit 1
          fi
          echo "OK: no secrets detected"
